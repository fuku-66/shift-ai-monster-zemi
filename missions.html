<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎯 課題一覧 — ドラゴンの書</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

  <header class="site-header">
    <h1 class="site-title"><a href="index.html">🐲 ドラゴンの書</a></h1>
    <p class="site-subtitle">課題カタログ</p>
    <nav class="site-nav">
      <a href="index.html">🏠 ホーム</a>
      <a href="missions.html" class="is-active">🎯 課題一覧</a>
      <a href="archive.html">📜 アーカイブ</a>
      <a href="how-to.html">📖 使い方・ルール</a>
    </nav>
  </header>

  <main class="main-missions">

    <section class="missions-section">
      <div class="missions-header">
        <h2 class="section-title">⚔️ 全課題（20件）</h2>
        <div class="missions-filter">
          <label>教科:
            <select id="missionFilterSubject">
              <option value="">すべて</option>
              <option value="英語">英語</option>
              <option value="数学">数学</option>
              <option value="国語">国語</option>
              <option value="その他">その他</option>
            </select>
          </label>
          <label>難易度:
            <select id="missionFilterDifficulty">
              <option value="">すべて</option>
              <option value="1">★1</option>
              <option value="2">★2</option>
              <option value="3">★3</option>
              <option value="4">★4</option>
              <option value="5">★5</option>
            </select>
          </label>
        </div>
      </div>
      <div id="missionGrid" class="mission-grid">
        <div class="submission-list__loading">課題を読み込み中...</div>
      </div>
      <p class="cta-note">💡 好きな課題を選んで、学習アウトプットを提出しよう！</p>
    </section>

    <section class="footer-links">
      <a href="index.html" class="link-box">← トップへ戻る</a>
    </section>

  </main>

  <footer class="site-footer">
    <p>SHIFT AIジュニア ドラゴン育成プロジェクト</p>
  </footer>

  <!-- 🎴 作品ポップアップ -->
  <div id="submissionModal" class="modal" aria-hidden="true">
    <div class="modal__backdrop" data-modal-close></div>
    <div class="modal__content" role="dialog" aria-modal="true">
      <button class="modal__close" data-modal-close aria-label="閉じる">×</button>
      <div id="modalBody" class="modal__body"></div>
    </div>
  </div>

  <script>
    window.__PAGE__ = 'missions';
  </script>
  <script src="assets/js/missions.js"></script>
  <script src="assets/js/script.js"></script>
</body>
</html>
