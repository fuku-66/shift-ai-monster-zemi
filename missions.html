<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>課題一覧 | モンスター育成プロジェクト</title>
<link rel="stylesheet" href="assets/css/style.css">
<link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
<style>
  /* フィルタバー */
  .filter-bar {
    display: flex; gap: 6px; flex-wrap: wrap;
    margin-bottom: 20px;
  }
  .filter-btn {
    padding: 6px 14px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(241,196,15,0.4);
    color: #d8c5ff;
    cursor: pointer; border-radius: 20px;
    font-family: inherit; font-size: 12px;
  }
  .filter-btn.active { background: #F1C40F; color: #0a0a1f; font-weight: bold; }

  /* 教科ブロック */
  .subject-block { margin-bottom: 28px; }
  .subject-header {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px;
    background: rgba(255,255,255,0.05);
    border-left: 5px solid var(--subject-color, #F1C40F);
    border-radius: 0 6px 6px 0;
    margin-bottom: 14px;
  }
  .subject-header h2 {
    color: #fff; font-size: 18px; margin: 0;
  }
  .subject-header .icon { font-size: 22px; }
  .subject-header .count {
    margin-left: auto;
    color: #aaa; font-size: 11px;
  }

  /* カードグリッド */
  .mission-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 12px;
  }
  .mission-card {
    background: linear-gradient(180deg, rgba(125, 60, 152, 0.15) 0%, rgba(42, 26, 77, 0.5) 100%);
    border: 1px solid var(--subject-color, rgba(241,196,15,0.3));
    border-radius: 10px;
    padding: 14px;
    display: flex; flex-direction: column; gap: 8px;
    transition: all 0.15s;
  }
  .mission-card:hover {
    transform: translateY(-2px);
    border-color: #F1C40F;
    box-shadow: 0 6px 16px rgba(241,196,15,0.2);
  }
  .mission-card .head {
    display: flex; justify-content: space-between; align-items: center;
  }
  .mission-card .stars {
    color: #F1C40F; font-size: 13px; letter-spacing: 1px;
  }
  .mission-card .xp-badge {
    color: #fff;
    background: rgba(241,196,15,0.4);
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px; font-weight: bold;
  }
  .mission-card .title {
    color: #fff;
    font-size: 14.5px;
    font-weight: bold;
    line-height: 1.5;
    flex: 1;
  }
  .mission-card .foot {
    margin-top: 4px;
    padding-top: 10px;
    border-top: 1px solid rgba(255,255,255,0.1);
  }
  .mission-card .submit-btn {
    display: block;
    background: linear-gradient(135deg, #F1C40F, #E67E22);
    color: #0a0a1f;
    text-align: center;
    text-decoration: none;
    padding: 8px 14px;
    font-size: 12px;
    font-weight: bold;
    border-radius: 6px;
    cursor: pointer;
    transition: transform 0.15s;
    font-family: inherit;
    border: none;
    width: 100%;
  }
  .mission-card .submit-btn:hover { transform: translateY(-1px); }
  .mission-card .submit-btn.disabled {
    opacity: 0.5; cursor: not-allowed;
  }

  .help-banner {
    padding: 12px 14px;
    background: rgba(241,196,15,0.08);
    border: 1px solid rgba(241,196,15,0.3);
    border-radius: 8px;
    margin-bottom: 16px;
    font-size: 13px;
    color: #d8c5ff;
    line-height: 1.5;
  }

  @media (max-width: 480px) {
    .mission-grid { grid-template-columns: 1fr; gap: 10px; }
    .subject-header h2 { font-size: 16px; }
  }
</style>
</head>
<body>

<!-- 右下固定ミニアバター -->
<div id="mini-monster" class="mini-monster mini-monster-br" onclick="openMonsterPopup()" title="モンスター詳細">
  <img id="mini-monster-img" src="" alt="">
  <div id="mini-monster-emoji" class="mini-emoji">🥚</div>
  <div class="mini-lv" id="mini-lv">Lv.1</div>
</div>

<!-- モンスター詳細ポップアップ -->
<div class="modal-backdrop" id="monster-modal-backdrop">
  <div class="modal monster-modal">
    <button class="close" onclick="closeMonsterPopup()">×</button>
    <div class="monster-image-wrap" style="margin:0 auto 16px;">
      <img id="modal-monster-img" src="" alt="" style="width:100%;height:100%;object-fit:contain;image-rendering:pixelated;">
      <div id="modal-monster-emoji" class="monster-placeholder">🥚</div>
    </div>
    <div id="modal-monster-name" class="monster-name">…</div>
    <div id="modal-monster-lv" class="monster-lv" style="margin-bottom:10px;">Lv.1</div>
    <div id="modal-monster-meta" style="color:#d8c5ff;font-size:13px;margin-bottom:16px;"></div>
    <a href="index.html" style="display:inline-block;color:#F1C40F;font-size:12px;text-decoration:underline;">ホームで詳細を見る →</a>
  </div>
</div>

<header class="site-header">
  <h1>⚔️ 課題一覧</h1>
  <p class="tagline">5教科×5レベル。挑戦したい課題を選ぼう</p>
  <nav class="nav">
    <a href="index.html">ホーム</a>
    <a href="missions.html" class="active">課題一覧</a>
    <a href="archive.html">アーカイブ</a>
    <a href="how-to.html">使い方</a>
  </nav>
</header>

<main class="container">

  <div class="help-banner">
    💡 課題を選んで「📝 提出する」を押すと、提出フォームが開きます<br>
    🏆 受賞・点数アップ等の<strong>成果</strong>は下のボタンから報告（成果物3件分にカウント）
  </div>

  <a id="result-cta" class="result-cta" href="#" target="_blank" rel="noopener">
    <span class="cta-icon">🏆</span>
    <span class="cta-text">
      <strong>成果を報告する</strong>
      コンテスト入賞・受賞・成績アップ・点数アップ・採用など（成果物3件分にカウント・講師承認後に公開）
    </span>
    <span class="cta-arrow">›</span>
  </a>

  <div class="filter-bar" id="filter-bar">
    <button class="filter-btn active" data-subject="all">すべて</button>
    <button class="filter-btn" data-subject="AI基礎">🤖 AI基礎</button>
    <button class="filter-btn" data-subject="英語">📖 英語</button>
    <button class="filter-btn" data-subject="数学">📐 数学</button>
    <button class="filter-btn" data-subject="勉強法">📚 勉強法</button>
    <button class="filter-btn" data-subject="クリエイティブ">🎨 クリエイティブ</button>
  </div>

  <div id="mission-area"></div>

</main>

<footer class="site-footer">© SHIFT AI ジュニア モンスター育成プロジェクト</footer>

<script src="assets/js/config.js"></script>
<script src="assets/js/monster.js"></script>
<script src="assets/js/api.js"></script>
<script>
const SUBJECTS = [
  { key: 'AI基礎',         icon: '🤖', color: '#4FC3F7' },
  { key: '英語',           icon: '📖', color: '#FF8A65' },
  { key: '数学',           icon: '📐', color: '#81C784' },
  { key: '勉強法',         icon: '📚', color: '#BA68C8' },
  { key: 'クリエイティブ', icon: '🎨', color: '#F06292' },
];
let MISSIONS = [];
let FORM_INFO = null;

(async function () {
  try {
    const res = await fetch('docs/missions.json');
    const json = await res.json();
    MISSIONS = json.missions || [];
  } catch (err) {
    document.getElementById('mission-area').innerHTML = '<p style="color:#aaa;">課題リストの読み込みに失敗しました</p>';
    return;
  }

  await Promise.allSettled([loadMonster(), loadFormInfo()]);
  render('all');
  updateResultCta();

  document.getElementById('filter-bar').addEventListener('click', (e) => {
    if (!e.target.classList.contains('filter-btn')) return;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    e.target.classList.add('active');
    render(e.target.dataset.subject);
  });
})();

let _monsterData = null;

async function loadMonster() {
  try {
    const state = await window.MZ_API.fetchState();
    const stats = state.stats || { ai:0, eng:0, math:0, study:0, creative:0 };
    const totalCount = (typeof state.totalCount === 'number')
      ? state.totalCount
      : Object.values(stats).reduce((a, b) => a + b, 0);
    const m = window.MZ_MONSTER.determineMonster(stats, totalCount);
    _monsterData = { m, state };

    const img = document.getElementById('mini-monster-img');
    const emoji = document.getElementById('mini-monster-emoji');
    const placeholder = m.placeholder || '画像準備中';
    const showPlaceholder = () => {
      if (img) img.style.display = 'none';
      if (emoji) {
        emoji.style.display = 'flex';
        emoji.textContent = placeholder;
        emoji.classList.add('placeholder-text');
      }
    };
    if (!m.imagePath) {
      showPlaceholder();
    } else if (img) {
      img.src = m.imagePath;
      img.alt = m.monsterName;
      img.onerror = showPlaceholder;
    }
    document.getElementById('mini-lv').textContent = 'Lv.' + m.lv;
  } catch (e) {}
}

function openMonsterPopup() {
  const backdrop = document.getElementById('monster-modal-backdrop');
  if (!backdrop) return;
  if (_monsterData) {
    const { m, state } = _monsterData;
    const mImg = document.getElementById('modal-monster-img');
    const mEmoji = document.getElementById('modal-monster-emoji');
    if (m.imagePath && mImg) {
      mImg.src = m.imagePath;
      mImg.alt = m.monsterName;
      mImg.style.display = '';
      if (mEmoji) mEmoji.style.display = 'none';
    } else if (mEmoji) {
      if (mImg) mImg.style.display = 'none';
      mEmoji.style.display = 'flex';
      mEmoji.textContent = m.placeholder || '🥚';
    }
    const cfg = window.MZ_CONFIG;
    const thresholds = cfg.LEVEL_THRESHOLDS || [0,10,20,30,40];
    const nextThreshold = thresholds[m.lv];
    const remaining = typeof nextThreshold === 'number' ? Math.max(0, nextThreshold - m.total) : 0;
    document.getElementById('modal-monster-name').textContent = m.monsterName;
    document.getElementById('modal-monster-lv').textContent = 'Lv.' + m.lv;
    document.getElementById('modal-monster-meta').textContent =
      `累計 ${m.total} 件` +
      (remaining > 0 ? ` ｜ 次のLvまで あと ${remaining} 件` : ' ｜ 🌟 最終形態到達');
  }
  backdrop.classList.add('show');
}

function closeMonsterPopup() {
  const backdrop = document.getElementById('monster-modal-backdrop');
  if (backdrop) backdrop.classList.remove('show');
}

document.addEventListener('DOMContentLoaded', () => {
  const backdrop = document.getElementById('monster-modal-backdrop');
  if (backdrop) {
    backdrop.addEventListener('click', e => {
      if (e.target.id === 'monster-modal-backdrop') closeMonsterPopup();
    });
  }
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeMonsterPopup();
  });
});

async function loadFormInfo() {
  const cfg = window.MZ_CONFIG;
  if (!cfg.GAS_URL || cfg.GAS_URL.includes('PUT_YOUR')) return;
  try {
    const res = await fetch(cfg.GAS_URL + '?action=formInfo');
    const data = await res.json();
    if (data.ok && data.formUrl && data.entries && data.entries.mission) {
      FORM_INFO = data;
      window.MZ_CONFIG.FORM_URL = data.formUrl;
    }
  } catch (e) {}
}

function buildPrefilledUrl(mission) {
  const cfg = window.MZ_CONFIG;
  const formUrl = (FORM_INFO && FORM_INFO.formUrl) || cfg.FORM_URL;
  if (!formUrl || formUrl.includes('PUT_YOUR')) return null;
  if (FORM_INFO && FORM_INFO.entries && FORM_INFO.entries.mission) {
    const display = `${mission.title} [${mission.id}]`;
    const params = new URLSearchParams();
    params.set('usp', 'pp_url');
    params.set(FORM_INFO.entries.mission, display);
    // カテゴリ=成果物 をプリフィル
    if (FORM_INFO.entries.category) params.set(FORM_INFO.entries.category, '📦 成果物');
    // 教科をプリフィル
    if (FORM_INFO.entries.subject) params.set(FORM_INFO.entries.subject, mission.subject);
    // 難易度をプリフィル
    if (FORM_INFO.entries.difficulty) {
      const diffMap = { 1: '★1 やさしい', 2: '★2', 3: '★3 ふつう', 4: '★4', 5: '★5 チャレンジ' };
      params.set(FORM_INFO.entries.difficulty, diffMap[mission.difficulty] || '★1 やさしい');
    }
    const sep = formUrl.includes('?') ? '&' : '?';
    return formUrl + sep + params.toString();
  }
  return formUrl;
}

function updateResultCta() {
  const a = document.getElementById('result-cta');
  if (!a) return;
  // 専用「🏆 成果報告フォーム」に飛ばす
  const url = (window.MZ_CONFIG && window.MZ_CONFIG.FORM_URL_RESULT) || '';
  if (url && !url.includes('PUT_YOUR')) {
    a.href = url;
    a.style.display = '';
  } else {
    a.style.display = 'none';
  }
}

function render(filter) {
  const filtered = filter === 'all'
    ? MISSIONS
    : MISSIONS.filter(m => m.subject === filter);

  const subjectsToShow = filter === 'all'
    ? SUBJECTS
    : SUBJECTS.filter(s => s.key === filter);

  const html = subjectsToShow.map(s => {
    const list = filtered
      .filter(m => m.subject === s.key)
      .sort((a, b) => a.difficulty - b.difficulty);
    if (!list.length) return '';
    const cards = list.map(m => {
      const url = buildPrefilledUrl(m);
      const btnHtml = url
        ? `<a href="${escapeAttr(url)}" target="_blank" rel="noopener" class="submit-btn">📝 提出する</a>`
        : `<button class="submit-btn disabled" disabled>📝 提出フォーム準備中</button>`;
      return `
        <div class="mission-card" style="--subject-color:${s.color}">
          <div class="title">${escapeHtml(m.title)}</div>
          <div class="foot">${btnHtml}</div>
        </div>`;
    }).join('');
    return `
      <section class="subject-block">
        <div class="subject-header" style="--subject-color:${s.color}">
          <span class="icon">${s.icon}</span>
          <h2>${s.key}</h2>
          <span class="count">${list.length}課題</span>
        </div>
        <div class="mission-grid">${cards}</div>
      </section>`;
  }).join('');

  document.getElementById('mission-area').innerHTML = html || '<p style="color:#aaa;text-align:center;padding:24px;">該当する課題がありません</p>';
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
}
function escapeAttr(s) { return escapeHtml(s); }
</script>
</body>
</html>
