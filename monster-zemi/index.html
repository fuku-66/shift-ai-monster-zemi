<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>モンスター育成プロジェクト | SHIFT AI ジュニア</title>
<link rel="stylesheet" href="assets/css/style.css">
<link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>

<header class="site-header">
  <h1>🥚 モンスター育成プロジェクト</h1>
  <p class="tagline">みんなの提出で、モンスターが育つ。提出した教科のバランスで姿が変わる。</p>
  <nav class="nav">
    <a href="index.html" class="active">ホーム</a>
    <a href="missions.html">課題一覧</a>
    <a href="archive.html">アーカイブ</a>
    <a href="how-to.html">使い方</a>
  </nav>
</header>

<main class="container">

  <section class="monster-section">
    <div class="monster-display">
      <div class="monster-image-wrap">
        <img id="monster-image" src="" alt="">
        <div id="monster-placeholder" class="monster-placeholder">🥚</div>
      </div>
      <div id="monster-name" class="monster-name">…</div>
      <div id="monster-lv" class="monster-lv">Lv.1</div>
    </div>

    <div class="stats-panel">
      <h2>📊 ステータス</h2>
      <div id="monster-total-xp" class="total-xp">0 XP</div>
      <div id="next-lv-info" class="next-lv-info"></div>

      <div class="meta-grid">
        <span class="label">総提出数</span>
        <span id="total-submissions" class="value">0 件</span>
        <span class="label">参加メンバー</span>
        <span id="total-members" class="value">0 人</span>
      </div>

      <ul class="axis-list">
        <li style="border-left-color:#4FC3F7"><span>🤖 AI基礎</span><span id="axis-ai">0 XP</span></li>
        <li style="border-left-color:#FF8A65"><span>📖 英語</span><span id="axis-eng">0 XP</span></li>
        <li style="border-left-color:#81C784"><span>📐 数学</span><span id="axis-math">0 XP</span></li>
        <li style="border-left-color:#BA68C8"><span>📚 勉強法</span><span id="axis-study">0 XP</span></li>
        <li style="border-left-color:#F06292"><span>🎨 クリエイティブ</span><span id="axis-creative">0 XP</span></li>
      </ul>
    </div>
  </section>

  <section class="radar-section">
    <h2>📡 5教科レーダーチャート</h2>
    <div class="radar-wrap">
      <canvas id="radar-chart"></canvas>
    </div>
  </section>

  <section class="cta-section">
    <a href="missions.html" class="btn-primary">⚔️ 課題に挑戦する</a>
  </section>

  <section class="recent-section">
    <h2>📥 最新の提出</h2>
    <ul id="recent-list" class="recent-list"></ul>
  </section>

</main>

<footer class="site-footer">
  © SHIFT AI ジュニア モンスター育成プロジェクト
</footer>

<script src="assets/js/config.js"></script>
<script src="assets/js/monster.js"></script>
<script src="assets/js/api.js"></script>
<script src="assets/js/main.js"></script>
</body>
</html>
